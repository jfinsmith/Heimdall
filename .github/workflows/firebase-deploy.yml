# HEIMDALL CI/CD. Three independent jobs:
#   build-and-deploy : gate (typecheck + lint + unit tests) -> Firebase Hosting
#   deploy-rules     : deploy Firestore rules + indexes (no longer manual-only)
#   emulator-tests   : rules + signup-concurrency tests on the emulator (needs Java)
#
# deploy-rules is its OWN job so a permissions gap there can't block the app
# deploy. Required repo secrets: VITE_FIREBASE_* (build), and
# FIREBASE_SERVICE_ACCOUNT_HEIMDALL_E1F03 (deploy). For deploy-rules to succeed,
# that service account needs the "Firebase Rules Admin" + "Cloud Datastore Index
# Admin" roles (or "Editor") in GCP IAM — it's created Hosting-only by
# `firebase init hosting:github`, so grant the extra roles once.
name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # ── Gate: nothing deploys unless typecheck, lint, and unit tests pass ──
      - name: Lint
        run: npm run lint
      - name: Typecheck + build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Unit tests
        run: npm test

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HEIMDALL_E1F03 }}
          channelId: live
          projectId: heimdall-e1f03

  # Independent so a rules/index permission gap can't block the app deploy.
  deploy-rules:
    runs-on: ubuntu-latest
    # Never ship security rules that fail their emulator tests, and deploy the
    # new client (hosting) first so a rules tightening can't reject the old
    # bundle's writes. A failure in either gate blocks the rules deploy.
    needs: [build-and-deploy, emulator-tests]
    steps:
      - uses: actions/checkout@v4
      # Token auth (firebase login:ci → FIREBASE_TOKEN secret). The service-account
      # ADC path (sa.json + GOOGLE_APPLICATION_CREDENTIALS) intermittently failed
      # "Failed to authenticate" in this job while the SAME secret kept working for
      # hosting — switched 2026-07-01. Re-mint with `firebase login:ci` if it ever
      # expires/revokes, then update the FIREBASE_TOKEN repo secret.
      - name: Deploy Firestore rules & indexes
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx -y firebase-tools@13 deploy --only firestore:rules,firestore:indexes \
            --project heimdall-e1f03 --non-interactive --token "$FIREBASE_TOKEN"
      # Best-effort: skips cleanly until Firebase Storage is enabled in the
      # console (firebasestorage.googleapis.com). Doesn't fail the job/firestore.
      - name: Deploy Storage rules (best-effort)
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx -y firebase-tools@13 deploy --only storage \
            --project heimdall-e1f03 --non-interactive --token "$FIREBASE_TOKEN"

  # Emulator-backed rules + signup-concurrency tests (need Java). Make it a
  # required status check in branch protection to gate merges.
  emulator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - name: Firestore rules + signup-concurrency tests (emulator)
        run: npx -y firebase-tools@13 emulators:exec --only firestore,auth "npm run test:emulator"
