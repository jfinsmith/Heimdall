# HEIMDALL CI/CD. Three independent jobs:
#   build-and-deploy : gate (typecheck + lint + unit tests) -> Firebase Hosting
#   deploy-rules     : deploy Firestore rules + indexes (no longer manual-only)
#   emulator-tests   : rules + signup-concurrency tests on the emulator (needs Java)
#
# deploy-rules is its OWN job so a permissions gap there can't block the app
# deploy. Required repo secrets: VITE_FIREBASE_* (build), and
# FIREBASE_SERVICE_ACCOUNT_HEIMDALL_E1F03 (deploy). For deploy-rules to succeed,
# that service account needs the "Firebase Rules Admin" + "Cloud Datastore Index
# Admin" roles (or "Editor") in GCP IAM — it's created Hosting-only by
# `firebase init hosting:github`, so grant the extra roles once.
name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # ── Gate: nothing deploys unless typecheck, lint, and unit tests pass ──
      - name: Lint
        run: npm run lint
      - name: Typecheck + build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Unit tests
        run: npm test

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HEIMDALL_E1F03 }}
          channelId: live
          projectId: heimdall-e1f03

  # Independent so a rules/index permission gap can't block the app deploy.
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Firestore & Storage rules + indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HEIMDALL_E1F03 }}' > "${{ runner.temp }}/sa.json"
          npx -y firebase-tools@13 deploy --only firestore:rules,firestore:indexes,storage \
            --project heimdall-e1f03 --non-interactive
          rm -f "${{ runner.temp }}/sa.json"

  # Emulator-backed rules + signup-concurrency tests (need Java). Make it a
  # required status check in branch protection to gate merges.
  emulator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - name: Firestore rules + signup-concurrency tests (emulator)
        run: npx -y firebase-tools@13 emulators:exec --only firestore,auth "npm run test:emulator"
