# Auto-rerun for the deploy-rules auth flake. The Firebase SA token exchange
# fails for an ENTIRE runner when it fails (all in-job retries fail together)
# but always succeeds on a fresh runner — so when the deploy workflow fails on
# its first attempt, re-run just the failed jobs once on new runners. A genuine
# failure (tests, bad rules) simply fails again on attempt 2 and stays failed.
name: Auto-rerun flaky deploy
on:
  workflow_run:
    workflows: ["Deploy to Firebase Hosting"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 2
    steps:
      - name: Re-run failed jobs once
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
